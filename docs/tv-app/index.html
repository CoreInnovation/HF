<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TV_APP</title>
<style>
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{ margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
        background:radial-gradient(1200px 600px at 50% -10%,#16324a,#0a0f17 60%); color:#e8eef5;
        display:flex; align-items:center; justify-content:center; min-height:100%; padding:24px; }
  .card{ width:100%; max-width:460px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.10);
         border-radius:18px; padding:54px 40px; text-align:center; box-shadow:0 30px 80px rgba(0,0,0,.45);
         backdrop-filter:blur(6px); }
  h1{ margin:0; font-size:48px; letter-spacing:.04em; font-weight:800;
      background:linear-gradient(90deg,#5ad1ff,#7ee0a1); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .tag{ margin:16px 0 0; font-size:15px; color:#8fa3b8; }
</style>
</head>
<body>
  <main class="card">
    <h1>TV_APP</h1>
    <p class="tag">A personal software project.</p>
  </main>
</body>
</html>
